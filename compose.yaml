services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - '${PORT}:${PORT}'
    restart: always
    depends_on:
      - database
      - redis

  database:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_MULTIPLE_DATABASES: ${EVO_DATABASE_NAME}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db/create-multiple-databases.sh:/docker-entrypoint-initdb.d/create-multiple-databases.sh

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - redis_data:/data

  evolution-api:
    image: atendai/evolution-api:v2.1.1
    restart: always
    ports:
      - '8080:8080'
    environment:
      - SERVER_TYPE=http
      - SERVER_URL=${EVO_SERVER_URL}
      - AUTHENTICATION_API_KEY=${EVO_API_KEY}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${DB_USER}:${DB_PASSWORD}@database:5432/${EVO_DATABASE_NAME}?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution-agendaok
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - CACHE_REDIS_PREFIX_KEY=evolution
      # Persistência de Dados (V2)
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
    depends_on:
      - database
      - redis

volumes:
  postgres_data:
  redis_data:
